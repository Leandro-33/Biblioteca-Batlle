<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Biblioteca de Batlle </title>
    <link rel="manifest" href="manifest.json">
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 30px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: #fff;
            border-radius: 20px;
            box-shadow: 0 8px 32px rgba(102, 126, 234, 0.15), 0 1.5px 6px rgba(76, 76, 76, 0.07);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(90deg, #764ba2 0%, #667eea 100%);
            color: #fff;
            padding: 40px 30px 25px 30px;
            text-align: center;
            border-radius: 20px 20px 0 0;
            box-shadow: 0 2px 12px rgba(102, 126, 234, 0.12);
        }

        .header h1 {
            font-size: 2.8em;
            margin-bottom: 8px;
            text-shadow: 2px 2px 8px rgba(0, 0, 0, 0.18);
            letter-spacing: 2px;
        }

        .header p {
            font-size: 1.2em;
            opacity: 0.85;
        }

        .controls {
            padding: 25px 30px;
            background: #f6f8fc;
            border-bottom: 1px solid #e3e6f0;
            display: flex;
            gap: 18px;
            flex-wrap: wrap;
            align-items: center;
        }

        .stats {
            display: flex;
            gap: 18px;
        }

        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            border-radius: 12px;
            padding: 18px 24px;
            box-shadow: 0 2px 8px rgba(102,126,234,0.13);
            text-align: center;
            min-width: 110px;
        }

        .stat-number {
            font-size: 2em;
            font-weight: bold;
        }

        .stat-label {
            font-size: 1em;
            opacity: 0.85;
        }

        .btn {
            padding: 12px 28px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            transition: all 0.2s ease;
            text-decoration: none;
            display: inline-block;
            box-shadow: 0 2px 8px rgba(102,126,234,0.10);
        }

        .btn-primary {
            background: linear-gradient(135deg, #007bff, #764ba2);
            color: white;
        }

        .btn-success {
            background: linear-gradient(135deg, #28a745, #667eea);
            color: white;
        }

        .btn-warning {
            background: linear-gradient(135deg, #ffc107, #e0a800);
            color: #212529;
        }

        .btn-secondary {
            background: #e3e6f0;
            color: #333;
        }

        .btn:hover {
            transform: translateY(-2px) scale(1.04);
            box-shadow: 0 6px 18px rgba(102,126,234,0.18);
            opacity: 0.93;
        }

        .search-box {
            background: #fff;
            border-radius: 10px;
            box-shadow: 0 2px 8px #764ba233;
            padding: 8px 16px;
            display: flex;
            align-items: center;
            border: 1.5px solid #764ba2;
            margin-left: 20px;
            max-width: 320px;
        }
        .search-box input {
            border: none;
            background: transparent;
            font-size: 1.1em;
            outline: none;
            width: 100%;
        }

        .table-container {
            padding: 30px;
            overflow-x: auto;
            border: 1px solid #e3e6f0;
            border-radius: 0 0 20px 20px;
            background: #fff;
        }
        table {
            width: 100%;
            min-width: 1200px;
            border-collapse: collapse;
            background: white;
            border-radius: 8px;
            overflow: hidden;
            margin: 0;
            box-shadow: 0 2px 8px rgba(102,126,234,0.07);
        }
        th, td {
            padding: 14px 10px;
            text-align: left;
            border-bottom: 1px solid #e3e6f0;
            white-space: nowrap;
            min-width: 60px;
        }
        th {
            background: linear-gradient(135deg, #343a40, #764ba2);
            color: white;
            font-weight: 600;
            position: sticky;
            top: 0;
            z-index: 10;
            border-right: 1px solid #e3e6f0;
        }
        tr:hover {
            background-color: #f6f8fc;
            transition: background 0.2s;
        }
        tbody tr:nth-child(even) {
            background: #f4f8fc;
        }
        tbody tr:nth-child(odd) {
            background: #fff;
        }
        .edit-btn {
            background: linear-gradient(135deg, #007bff, #764ba2);
            color: #fff;
            border: none;
            padding: 7px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            margin-right: 4px;
        }
        .edit-btn:hover {
            background: linear-gradient(135deg, #0056b3, #764ba2);
        }
        .delete-btn {
            background: linear-gradient(135deg, #dc3545, #764ba2);
            color: white;
            border: none;
            padding: 7px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
        }
        .delete-btn:hover {
            background: linear-gradient(135deg, #a71d2a, #764ba2);
        }
        /* Modal */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(102,126,234,0.18);
            backdrop-filter: blur(5px);
            overflow-y: auto;
        }
        .modal-content {
            background-color: #fff;
            margin: 5% auto;
            padding: 0;
            border-radius: 20px;
            width: 95%;
            max-width: 600px;
            max-height: 85vh;
            overflow-y: auto;
            box-shadow: 0 20px 40px rgba(102,126,234,0.22);
            animation: modalSlideIn 0.3s ease;
            position: relative;
            top: 0;
        }
        @keyframes modalSlideIn {
            from { opacity: 0; transform: translateY(-60px);}
            to { opacity: 1; transform: translateY(0);}
        }
        .modal-header {
            background: linear-gradient(135deg, #764ba2, #667eea);
            color: white;
            padding: 24px 32px;
            border-radius: 20px 20px 0 0;
        }
        .modal-header h2 {
            margin: 0;
            font-size: 1.5em;
        }
        .close {
            position: absolute;
            right: 24px;
            top: 24px;
            font-size: 2em;
            color: #fff;
            cursor: pointer;
            opacity: 0.8;
        }
        .close:hover {
            opacity: 1;
        }
        .modal-body {
            padding: 28px 32px;
        }
        .form-group {
            margin-bottom: 18px;
        }
        .form-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 6px;
            color: #764ba2;
        }
        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 10px 14px;
            border: 1.5px solid #e3e6f0;
            border-radius: 7px;
            font-size: 15px;
            background: #f6f8fc;
            transition: border-color 0.2s;
        }
        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            border-color: #764ba2;
            outline: none;
        }
        .form-group textarea {
            min-height: 40px;
            resize: vertical;
        }
        .form-actions {
            display: flex;
            justify-content: flex-end;
            gap: 12px;
            margin-top: 18px;
        }
        .loan-form, .donation-form {
            background: #f6f8fc;
            border-radius: 10px;
            padding: 14px 18px;
            margin-bottom: 12px;
            box-shadow: 0 1px 4px rgba(102,126,234,0.07);
        }
        .loan-form h4, .donation-form h4 {
            color: #764ba2;
            margin-bottom: 10px;
        }
        @media (max-width: 900px) {
            .container, .table-container, .modal-content {
                padding: 10px;
                border-radius: 10px;
            }
            .header {
                padding: 18px 10px;
                border-radius: 10px 10px 0 0;
            }
            .controls {
                padding: 10px;
                gap: 10px;
            }
            .modal-body {
                padding: 12px 10px;
            }
        }
        /* Alert flotante */
        #autoAlert {
            display:none;
            position:fixed;
            top:30px;
            right:30px;
            z-index:9999;
            padding:16px 28px;
            background:#764ba2;
            color:#fff;
            border-radius:8px;
            box-shadow:0 2px 8px #764ba299;
            font-size:1.2em;
        }
        .estante-box {
            background: #f6f8fc;
            border-radius: 12px;
            box-shadow: 0 2px 8px #764ba233;
            padding: 10px 18px;
            display: flex;
            align-items: center;
            border: 2px solid #764ba2;
            margin-left: 20px;
            gap: 8px;
            max-width: 350px;
        }
        .estante-box input {
            border: none;
            background: transparent;
            font-size: 1.1em;
            outline: none;
            width: 100px;
            margin-right: 8px;
        }
        .estante-box button {
            margin-left: 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📚 Biblioteca de Batlle</h1>
            <p>Sistema de Gestión de Biblioteca</p>
        </div>
        <div class="controls">
            <div class="stats">
                <div class="stat-card">
                    <div class="stat-number" id="totalBooks">0</div>
                    <div class="stat-label">Total Libros</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="availableBooks">0</div>
                    <div class="stat-label">Disponibles (físicos)</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="loanedBooks">0</div>
                    <div class="stat-label">Prestados</div>
                </div>
            </div>
            <button class="btn btn-primary" onclick="openAddBookModal()">➕ Agregar Nuevo Libro</button>
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="🔍 Buscar libros por título, autor, año..." oninput="searchBooks()" onkeyup="searchBooks()">
            </div>
            <input type="file" id="importFile" accept=".xlsx,.xls,.csv" style="display: none;" onchange="importData()">
            <div style="display: flex; align-items: center; gap: 10px; width: 100%; margin-top: 18px;">
                <button class="btn btn-warning" onclick="document.getElementById('importFile').click()">📁 Importar Excel</button>
                <button class="btn btn-success" onclick="exportData()">📊 Exportar Datos</button>
                <div class="estante-box" style="margin-left:0;max-width:350px;width:100%;">
                    <input type="number" id="searchEstante" placeholder="Estante..." min="1">
                    <button class="btn btn-secondary" onclick="searchByEstante()">Buscar</button>
                    <button class="btn btn-secondary" onclick="exportEstantePDF()">PDF</button>
                </div>
            </div>
        </div>
        <div class="table-container">
            <table id="booksTable">
                <thead>
                    <tr>
                        <th>Ordinal</th>
                        <th>Estante</th>
                        <th>Apellido</th>
                        <th>Nombre</th>
                        <th>Título</th>
                        <th>Año</th>
                        <th>Encuadernado</th>
                        <th>Observaciones</th>
                        <th>Ejemplares</th>
                        <th>Acción</th>
                        <th>Editar</th>
                        <th>Eliminar</th>
                    </tr>
                </thead>
                <tbody id="booksTableBody"></tbody>
            </table>
        
    </div>
    <!-- Alert flotante -->
    <div id="autoAlert"></div>
    <!-- Modal para agregar/editar libro (igual que antes) -->
    <!-- ...tu modal aquí... -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
    <script>
        let books = [];
        let nextOrdinal = 1;
        let editingIndex = -1;

        window.onload = function () {
            loadBooks();
            updateStats();
            renderTable();
            setInterval(autoSave, 30000);
        };

        function showAutoAlert(msg, ms=2000) {
            const el = document.getElementById('autoAlert');
            el.textContent = msg;
            el.style.display = 'block';
            setTimeout(()=>{ el.style.display='none'; }, ms);
        }

        function loadBooks() {
            const stored = localStorage.getItem('bibliotecaBatlle');
            if (stored) {
                const data = JSON.parse(stored);
                books = data.books || [];
                nextOrdinal = data.nextOrdinal || 1;
            }
        }

        function saveBooks() {
            const data = {
                books: books,
                nextOrdinal: nextOrdinal,
                lastSaved: new Date().toISOString()
            };
            localStorage.setItem('bibliotecaBatlle', JSON.stringify(data));
        }

        function autoSave() {
            saveBooks();
        }

        function updateStats() {
            const total = books.reduce((sum, b) => sum + (parseInt(b.ejemplares)||1), 0);
            const donados = books.filter(b => b.accion === 'Donado').reduce((sum, b) => sum + (parseInt(b.ejemplares)||1), 0);
            const prestados = books.filter(b => b.accion === 'Prestado').reduce((sum, b) => sum + (parseInt(b.ejemplares)||1), 0);
            const disponibles = total - donados - prestados;
            document.getElementById('totalBooks').textContent = total;
            document.getElementById('availableBooks').textContent = disponibles;
            document.getElementById('loanedBooks').textContent = prestados;
        }

        function renderTable(filteredBooks) {
            const tbody = document.getElementById('booksTableBody');
            const booksToShow = filteredBooks || books;
            tbody.innerHTML = booksToShow.map((book, i) => {
                const realIndex = books.findIndex(b => b.ordinal === book.ordinal);
                return `
                    <tr>
                        <td>${book.ordinal}</td>
                        <td>${book.estante}</td>
                        <td>${book.apellido}</td>
                        <td>${book.nombre}</td>
                        <td>${book.titulo}</td>
                        <td>${book.año}</td>
                        <td>${book.encuadernado}</td>
                        <td>${book.observaciones}</td>
                        <td>${book.ejemplares}</td>
                        <td>
                            <select onchange="changeAction(${realIndex}, this.value)">
                                <option value="Disponible" ${book.accion==='Disponible'?'selected':''}>Disponible</option>
                                <option value="Prestado" ${book.accion==='Prestado'?'selected':''}>Prestado</option>
                                <option value="Donado" ${book.accion==='Donado'?'selected':''}>Donado</option>
                                <option value="Para donar" ${book.accion==='Para donar'?'selected':''}>Para donar</option>
                            </select>
                        </td>
                        <td><button class="edit-btn" onclick="editBook(${realIndex})">✏️ Editar</button></td>
                        <td><button class="delete-btn" onclick="deleteBook(${realIndex})">🗑️ Eliminar</button></td>
                    </tr>
                `;
            }).join('');
        }

        function changeAction(index, value) {
            books[index].accion = value;
            saveBooks();
            updateStats();
            renderTable();
            showAutoAlert('Acción actualizada');
        }

        function deleteBook(index) {
            if (confirm('¿Seguro que deseas eliminar este libro?')) {
                books.splice(index, 1);
                // Reasignar ordinales
                books.forEach((b, i) => b.ordinal = i + 1);
                nextOrdinal = books.length + 1;
                saveBooks();
                updateStats();
                renderTable();
                showAutoAlert('✅ Libro eliminado correctamente.');
            }
        }

        function searchBooks() {
            renderTable();
        }

        function searchByEstante() {
            const estante = document.getElementById('searchEstante').value.trim();
            if (!estante) {
                renderTable();
                return;
            }
            const filtered = books.filter(b => b.estante == estante);
            renderTable(filtered);
        }

        function exportEstantePDF() {
            const estante = document.getElementById('searchEstante').value.trim();
            if (!estante) {
                showAutoAlert('Ingrese un número de estante');
                return;
            }
            const libros = books.filter(b => b.estante == estante);
            if (libros.length === 0) {
                showAutoAlert('No hay libros en ese estante');
                return;
            }
            // Crear PDF en horizontal
            const doc = new window.jspdf.jsPDF({ orientation: "landscape" });

            // Recuadro de control arriba, más ancho y alineado (rojo)
            const pageWidth = doc.internal.pageSize.getWidth();
            doc.setDrawColor(200, 40, 40); // Rojo fuerte para recuadro y cuadros de tick
            doc.setTextColor(160, 20, 20); // Texto rojo oscuro
            doc.setLineWidth(0.8);
            doc.roundedRect(12, 10, pageWidth - 24, 22, 4, 4);
            doc.setFontSize(13);
            doc.text(`Control de Estante: ${estante}`, 18, 18);
            doc.setFontSize(11);
            doc.text(`Fecha: ${new Date().toLocaleString()}`, 18, 26);
            doc.text("Nombre de quien controla: ___________________________", pageWidth / 2, 18);
            doc.text("Firma: ___________________________", pageWidth / 2, 26);

            // Datos para la tabla
            const tableColumn = ["Apellido", "Nombre", "Título", "✓"];
            const tableRows = libros.map(b => [
                b.apellido,
                b.nombre,
                b.titulo,
                "" // Aquí irá el cuadrado
            ]);

            // Generar tabla con cuadro más chico y centrado, cabecera roja
            doc.autoTable({
                head: [tableColumn],
                body: tableRows,
                startY: 38,
                headStyles: { fillColor: [200, 40, 40], textColor: [255,255,255] }, // Cabecera tabla rojo fuerte
                styles: { fontSize: 12, cellWidth: 'auto', textColor: [120, 20, 20] }, // Texto tabla rojo oscuro
                columnStyles: {
                    3: { cellWidth: 12, halign: 'center' }
                },
                didDrawCell: function (data) {
                    // Dibuja un cuadrado pequeño y centrado en la columna del tick
                    if (data.column.index === 3 && data.section === 'body') {
                        const boxSize = 7;
                        const x = data.cell.x + (data.cell.width - boxSize) / 2;
                        const y = data.cell.y + (data.cell.height - boxSize) / 2;
                        doc.setDrawColor(200, 40, 40); // Rojo fuerte
                        doc.rect(x, y, boxSize, boxSize);
                    }
                }
            });

            doc.save(`Estante_${estante}_control.pdf`);
        }

        function importData() {
            const file = document.getElementById('importFile').files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function (e) {
                try {
                    const data = new Uint8Array(e.target.result);
                    const workbook = XLSX.read(data, { type: 'array' });
                    const sheetName = workbook.SheetNames[0];
                    const worksheet = workbook.Sheets[sheetName];
                    const jsonData = XLSX.utils.sheet_to_json(worksheet);
                    books = jsonData.map(row => ({
                        ordinal: row.ORDINAL || nextOrdinal++,
                        estante: row.ESTANTE || '',
                        apellido: row.APELLIDO || '',
                        nombre: row.NOMBRE || '',
                        titulo: row.TITULO || '',
                        año: row.AÑO || '',
                        encuadernado: row.ENCUADERNADO || 'No',
                        observaciones: row.OBSERVACIONES || '',
                        ejemplares: row.EJEMPLARES || 1,
                        accion: row.ACCION || 'Disponible'
                    }));
                    if (books.length > 0) {
                        nextOrdinal = Math.max(...books.map(book => book.ordinal)) + 1;
                        saveBooks();
                        updateStats();
                        renderTable();
                        showAutoAlert('📥 Datos importados correctamente');
                    }
                } catch (error) {
                    console.error('Error al importar datos:', error);
                    showAutoAlert('Error al importar datos. Verifica el archivo y vuelve a intentar.', 4000);
                }
            };
            reader.readAsArrayBuffer(file);
        }

        function exportData() {
            const exportData = books.map(book => {
                const row = {
                    'ORDINAL': book.ordinal,
                    'ESTANTE': book.estante,
                    'APELLIDO': book.apellido,
                    'NOMBRE': book.nombre,
                    'TITULO': book.titulo,
                    'AÑO': book.año,
                    'ENCUADERNADO': book.encuadernado,
                    'OBSERVACIONES': book.observaciones,
                    'EJEMPLARES': book.ejemplares,
                    'ACCION': book.accion
                };
                return row;
            });
            const ws = XLSX.utils.json_to_sheet(exportData);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, 'Biblioteca Batlle');
            const today = new Date().toISOString().split('T')[0];
            XLSX.writeFile(wb, `Biblioteca_Batlle_${today}.xlsx`);
        }

        // ...resto de tu código JS (modal, agregar/editar libro, etc.)...
    </script>
</body>
</html>
